<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - David Chandler</title>
    <meta name="description" content="{{description}}">
    <meta name="author" content="David Chandler">
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{title}}">
    <meta property="og:description" content="{{description}}">
    
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/post.css">
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    
    <!-- JetBrains Mono for code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<nav class="nav">
    <div class="nav-container">
        <a href="../../index.html" class="nav-brand">DC</a>
        <div class="nav-links">
            <a href="../../index.html">Home</a>
            <a href="../../experience.html">Experience</a>
            <a href="../../projects.html">Projects</a>
            <a href="../../blog.html" class="active">Blog</a>
            <a href="../../contact.html">Contact</a>
        </div>
        <button class="mobile-menu-toggle" onclick="toggleMobileMenu()" aria-label="Toggle menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </div>
</nav>

<!-- Reading progress bar -->
<div class="reading-progress" id="reading-progress"></div>

<!-- Table of Contents - Fixed sidebar, outside main content flow -->
{{toc}}

<div class="post-layout">
    <main class="post-container">
        <a href="../../blog.html" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Blog
        </a>

        <article class="post-article">
            <header class="post-header">
                <div class="post-meta">
                    <time datetime="{{date}}">{{date}}</time>
                    <span class="meta-separator">&bull;</span>
                    <span class="reading-time">{{reading_time}} min read</span>
                    {{tags}}
                </div>
            </header>
            
            <div class="blog-post-content">
                {{content}}
            </div>
        </article>
        
        <footer class="post-footer">
            <div class="post-nav">
                <a href="../../blog.html" class="btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    All Posts
                </a>
            </div>
        </footer>
    </main>
</div>

<footer class="footer">
    <p>Built without a framework because we don't need the bloat.</p>
</footer>

<script>
// Copy code functionality
function copyCode(button) {
    const wrapper = button.parentElement;
    const pre = wrapper.querySelector('pre');
    const code = pre.textContent;
    
    navigator.clipboard.writeText(code).then(() => {
        const textSpan = button.querySelector('.copy-text');
        const originalText = textSpan.textContent;
        textSpan.textContent = 'Copied!';
        button.classList.add('copied');
        
        setTimeout(() => {
            textSpan.textContent = originalText;
            button.classList.remove('copied');
        }, 2000);
    }).catch(err => {
        console.error('Failed to copy:', err);
    });
}

// ToC toggle functionality
function toggleToc() {
    const toc = document.getElementById('toc');
    toc.classList.toggle('collapsed');
}

// Mobile menu toggle
function toggleMobileMenu() {
    const navLinks = document.querySelector('.nav-links');
    navLinks.classList.toggle('mobile-open');
}

// Reading progress bar
function updateReadingProgress() {
    const article = document.querySelector('.post-article');
    const progressBar = document.getElementById('reading-progress');
    
    if (!article || !progressBar) return;
    
    const articleRect = article.getBoundingClientRect();
    const articleTop = window.scrollY + articleRect.top;
    const articleHeight = articleRect.height;
    const windowHeight = window.innerHeight;
    
    const scrolled = window.scrollY - articleTop + windowHeight * 0.3;
    const progress = Math.min(Math.max(scrolled / articleHeight * 100, 0), 100);
    
    progressBar.style.width = `${progress}%`;
}

// Active ToC highlighting
function updateActiveTocItem() {
    const headings = document.querySelectorAll('.blog-post-content h1[id], .blog-post-content h2[id], .blog-post-content h3[id], .blog-post-content h4[id]');
    const tocLinks = document.querySelectorAll('.toc-list a');
    
    if (!headings.length || !tocLinks.length) return;
    
    let activeId = null;
    const scrollPos = window.scrollY + 100;
    
    headings.forEach(heading => {
        if (heading.offsetTop <= scrollPos) {
            activeId = heading.id;
        }
    });
    
    tocLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === `#${activeId}`) {
            link.classList.add('active');
        }
    });
}

// Smooth scroll for ToC links
document.querySelectorAll('.toc-list a').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();
        const targetId = this.getAttribute('href').slice(1);
        const targetElement = document.getElementById(targetId);
        
        if (targetElement) {
            const offset = 80; // Account for sticky nav
            const targetPosition = targetElement.offsetTop - offset;
            
            window.scrollTo({
                top: targetPosition,
                behavior: 'smooth'
            });
            
            // Update URL without triggering scroll
            history.pushState(null, null, `#${targetId}`);
        }
    });
});

// Event listeners
window.addEventListener('scroll', () => {
    updateReadingProgress();
    updateActiveTocItem();
}, { passive: true });

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    updateReadingProgress();
    updateActiveTocItem();
    
    // Handle direct links to anchors
    if (window.location.hash) {
        setTimeout(() => {
            const targetElement = document.querySelector(window.location.hash);
            if (targetElement) {
                const offset = 80;
                window.scrollTo({
                    top: targetElement.offsetTop - offset,
                    behavior: 'smooth'
                });
            }
        }, 100);
    }
});
</script>
</body>
</html>
